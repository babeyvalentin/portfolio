<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Valentin Babey — Portfolio</title>
  <meta name="description" content="Portfolio — sélection de projets." />
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>

  <!-- Home centered -->
  <main class="home wrap">
    <section class="homeCenter" aria-label="Accueil">
      <h1 class="homeName" id="homeName">Valentin Babey</h1>

      <div class="homeFilters" aria-label="Navigation">
        <button class="homeBtn filter is-active" data-filter="Commercial" type="button">Commercial</button>
        <button class="homeBtn filter" data-filter="Realized Lab" type="button">Realized Lab</button>
        <button class="homeBtn" id="bioBtn" type="button">Biography</button>
      </div>
    </section>

    <!-- Random overview -->
    <section class="overview" aria-label="Overview random">
      <div class="overviewHead">
        <span class="overviewTitle">Overview</span>
        <button class="linklike" id="rerollBtn" type="button">Randomize</button>
      </div>
      <div class="overviewGrid" id="overviewGrid"></div>
    </section>

    <!-- (Optionnel) si tu veux garder une grille par projet -->
    <section class="grid" id="grid" aria-label="Projets" hidden></section>

    <footer class="footer">
      <div>© <span id="year"></span> — All rights reserved</div>
    </footer>
  </main>

  <!-- Bio modal -->
  <dialog class="modal" id="bioModal" aria-label="Biography">
    <div class="modal__card">
      <div class="modal__head">
        <strong>Biography</strong>
        <button class="x" id="bioClose" type="button" aria-label="Fermer">✕</button>
      </div>
      <div class="modal__body" id="bioContent"></div>
    </div>
  </dialog>

  <script src="./assets/data.js"></script>
  <script src="./assets/script.js"></script>
</body>
</html>
