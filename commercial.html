<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Commercial — Valentin Babey</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>

<header class="topbar">
  <div class="wrap topbar__inner">
    <a class="brand" href="./">Valentin Babey</a>
    <a class="linklike" href="./">Home</a>
  </div>
</header>

<main class="wrap">
  <h1 style="margin:40px 0 20px;">Commercial</h1>
  <section class="grid" id="categoryGrid"></section>
</main>

<script src="./assets/data.js"></script>
<script>
  const grid = document.getElementById("categoryGrid");

  const items = window.PORTFOLIO.projects.filter(
    p => p.category === "Commercial"
  );

  grid.innerHTML = items.map(p => `
    <a class="card" href="project.html?id=${p.id}">
      <div class="thumb">
        <img src="${p.cover}" alt="${p.title}">
      </div>
      <div class="card__body">
        <h3 class="card__title">${p.title}</h3>
      </div>
    </a>
  `).join("");
</script>

</body>
</html>
